name: Deploy Website

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: book-cv-master
  cancel-in-progress: true

env:
  POSTGRES_DB: bookcv
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: 127.0.0.1
  POSTGRES_PORT: 5432
  DJANGO_SECRET_KEY: github-actions-secret-key
  DJANGO_DEBUG: true
  DJANGO_SECURE_COOKIES: false
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
  DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000,http://127.0.0.1:8000
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  NEXT_PUBLIC_API_URL: http://localhost:8000/api
  NEXT_PUBLIC_ADMIN_URL: http://localhost:8000/admin

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: bookcv
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bookcv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/client
        run: npm ci

      - name: Build frontend
        working-directory: app/client
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/server/requirements.txt

      - name: Run Django checks
        working-directory: app/server
        run: |
          python manage.py migrate --noinput
          python manage.py check
          python manage.py test

  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync files to work directory
        run: |
          # Since the runner is on the same machine, we use local rsync
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".env" \
            --exclude "app/client/node_modules/" \
            --exclude "app/client/.next/" \
            ./ /work/book-cv/

      - name: Restart containers
        run: |
          cd /work/book-cv
          # This runs the local script you already have
          bash scripts/deploy-remote.sh
